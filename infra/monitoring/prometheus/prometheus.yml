global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: helium-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend:8080
    # For HA deployments with multiple replicas
    dns_sd_configs:
      - names:
          - backend
        type: A
        port: 8080

  - job_name: helium-backend-ha
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend-1:8080
          - backend-2:8080
          - backend-3:8080

rule_files:
  - /etc/prometheus/rules/*.yml
