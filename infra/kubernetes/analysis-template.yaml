apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: helium-success-rate
  namespace: helium
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      successCondition: result[0] >= 0.99
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus:9090
          query: |
            sum(rate(http_server_requests_seconds_count{application="helium-core",status=~"2..|3..|4.."}[5m])) 
            / 
            sum(rate(http_server_requests_seconds_count{application="helium-core"}[5m]))
