apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: helium-backend
  namespace: helium
  labels:
    app.kubernetes.io/name: helium-backend
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: helium-backend
  template:
    metadata:
      labels:
        app: helium-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: backend
          image: ghcr.io/helium-exchange/helium-backend:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: helium-backend-secrets
            - configMapRef:
                name: helium-backend-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
  strategy:
    canary:
      # Blue/Green style canary rollout
      steps:
        - setWeight: 5
        - pause: {duration: 60s}
        - analysis:
            templates:
              - templateName: helium-success-rate
        - setWeight: 25
        - pause: {duration: 5m}
        - analysis:
            templates:
              - templateName: helium-success-rate
        - setWeight: 100
      trafficRouting:
        nginx:
          stableIngress: helium-ingress
