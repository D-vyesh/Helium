# IMPORTANT: Replace placeholder values before deploying.
# In production, use sealed-secrets, external-secrets-operator, or Vault CSI driver.
apiVersion: v1
kind: Secret
metadata:
  name: helium-backend-secrets
  namespace: helium
  labels:
    app.kubernetes.io/name: helium-backend
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  HELIUM_DB_USERNAME: helium
  HELIUM_DB_PASSWORD: CHANGE-ME-BEFORE-PRODUCTION
  HELIUM_REDIS_PASSWORD: CHANGE-ME-BEFORE-PRODUCTION
  HELIUM_API_KEY_PEPPER: CHANGE-ME-BEFORE-PRODUCTION
  HELIUM_API_KEY_PREVIOUS_PEPPER: ""
