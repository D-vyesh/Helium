name: helium

services:
  postgres:
    image: postgres:16-alpine
    container_name: helium-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helium}
      POSTGRES_USER: ${POSTGRES_USER:-helium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helium}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helium} -d ${POSTGRES_DB:-helium}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helium-redis
    profiles:
      - redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

