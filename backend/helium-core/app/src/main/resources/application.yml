spring:
  application:
    name: helium-core
  profiles:
    default: local
  datasource:
    url: ${HELIUM_DB_URL:jdbc:postgresql://localhost:5432/helium}
    username: ${HELIUM_DB_USERNAME:helium}
    password: ${HELIUM_DB_PASSWORD:helium}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${HELIUM_HTTP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

helium:
  environment: ${HELIUM_ENVIRONMENT:local}

